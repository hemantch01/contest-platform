services:
  # ─── MongoDB ───
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-net

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  # ─── Backend Server 1 ───
  server-1:
    build: ./server
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/contest-platform
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-abc123}
      - CSRF_SECRET=${CSRF_SECRET:-change-this-csrf-secret}
      - PORT=5000
      - CLIENT_URL=http://3.6.89.37
      - NODE_ENV=production
      - TZ=Asia/Kolkata
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  # ─── Backend Server 2 ───
  server-2:
    build: ./server
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/contest-platform
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-abc123}
      - CSRF_SECRET=${CSRF_SECRET:-change-this-csrf-secret}
      - PORT=5000
      - CLIENT_URL=http://3.6.89.37
      - NODE_ENV=production
      - TZ=Asia/Kolkata
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  # ─── Frontend Client 1 ───
  client-1:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://3.6.89.37/api
        NEXT_PUBLIC_SOCKET_URL: ws://3.6.89.37/ws
    restart: unless-stopped
    depends_on:
      - server-1
    networks:
      - app-net

  # ─── Frontend Client 2 ───
  client-2:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://3.6.89.37/api
        NEXT_PUBLIC_SOCKET_URL: ws://3.6.89.37/ws
    restart: unless-stopped
    depends_on:
      - server-1
    networks:
      - app-net

  # ─── Nginx Reverse Proxy / Load Balancer ───
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client-1
      - client-2
      - server-1
      - server-2
    networks:
      - app-net

volumes:
  mongo-data:
  redis-data:

networks:
  app-net:
    driver: bridge
